<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BotCheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --surface-2: #121223;
      --border: #1a1a2e;
      --border-strong: #2b2b4a;
      --text: #f5f7fb;
      --muted: #9ca3af;
      --accent: #6366f1;
      --safe: #22c55e;
      --critical: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(180deg, rgba(99, 102, 241, 0.12) 0%, rgba(8, 8, 16, 0) 280px),
        var(--bg);
      background-size: 38px 38px, 38px 38px, auto, auto;
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
    }

    button,
    select {
      font: inherit;
    }

    .font-mono {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .panel,
    .feedback-card,
    .metric {
      background: rgba(15, 15, 26, 0.88);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
    }

    .panel {
      padding: 22px;
    }

    .panel-accent {
      position: relative;
      overflow: hidden;
    }

    .panel-accent::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent 78%);
    }

    .header-panel {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
    }

    .icon-box {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border: 1px solid rgba(99, 102, 241, 0.55);
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.13);
      color: var(--accent);
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      color: #dbe3f3;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .section-label::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--border);
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .preset-btn,
    .run-btn,
    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      color: var(--text);
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .preset-btn {
      background: #101024;
      padding: 12px 14px;
      justify-content: space-between;
      text-align: left;
    }

    .preset-btn:hover,
    .feedback-card:hover {
      border-color: rgba(99, 102, 241, 0.74);
    }

    .preset-btn:active,
    .run-btn:active,
    .retry-btn:active {
      transform: translateY(1px);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--muted);
      box-shadow: 0 0 18px currentColor;
    }

    .selector-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: #090916;
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
    }

    .run-row {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .run-btn,
    .retry-btn {
      min-width: 190px;
      background: var(--accent);
      border-color: rgba(129, 140, 248, 0.7);
      padding: 0 18px;
      font-weight: 800;
    }

    .run-btn:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .button-spinner {
      display: none;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255, 255, 255, 0.38);
      border-top-color: #fff;
      border-radius: 999px;
      animation: spin 760ms linear infinite;
    }

    .run-btn.loading .button-spinner {
      display: inline-block;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-height: 78px;
      padding: 15px;
      display: grid;
      gap: 7px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric-value {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(156, 163, 175, 0.3);
      padding: 4px 9px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #d7dcea;
      background: rgba(156, 163, 175, 0.1);
      white-space: nowrap;
    }

    .badge svg {
      width: 13px;
      height: 13px;
    }

    .badge-safe,
    .badge-pass,
    .badge-ok,
    .badge-true {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
    }

    .badge-critical,
    .badge-fail,
    .badge-mismatch,
    .badge-false {
      border-color: rgba(239, 68, 68, 0.52);
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
    }

    .badge-warning {
      border-color: rgba(245, 158, 11, 0.52);
      background: rgba(245, 158, 11, 0.12);
      color: #fcd34d;
    }

    .feedback-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .feedback-card {
      min-height: 188px;
      padding: 18px;
      transition: border-color 160ms ease;
    }

    .feedback-card h3 {
      margin: 12px 0 11px;
      font-size: 1.03rem;
      line-height: 1.28;
      font-weight: 800;
      letter-spacing: 0;
    }

    .feedback-card p {
      margin: 8px 0 0;
      color: #c6ccda;
      line-height: 1.58;
      font-size: 0.92rem;
    }

    .feedback-card header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.73rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .feedback-card.critical {
      border-color: rgba(239, 68, 68, 0.42);
    }

    .feedback-card.safe {
      border-color: rgba(34, 197, 94, 0.38);
    }

    .part-chip {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      margin-top: 14px;
      border: 1px solid rgba(99, 102, 241, 0.62);
      border-radius: 6px;
      padding: 7px 9px;
      background: rgba(99, 102, 241, 0.14);
      color: #c7d2fe;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.78rem;
      white-space: normal;
    }

    .spec-line {
      color: var(--muted) !important;
    }

    .compat-row {
      display: grid;
      grid-template-columns: minmax(74px, auto) auto 1fr;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .compat-row strong {
      font-size: 0.83rem;
      color: #e5e7eb;
    }

    .state-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(239, 68, 68, 0.52);
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.12);
      padding: 14px;
      color: #fecaca;
    }

    .state-banner p {
      margin: 4px 0 0;
      color: #fca5a5;
      font-size: 0.88rem;
    }

    .feedback-section[hidden],
    .feedback-grid[hidden],
    .skeleton-grid[hidden] {
      display: none;
    }

    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .skeleton-card {
      min-height: 188px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 18px;
      overflow: hidden;
    }

    .skeleton-line {
      height: 14px;
      margin-top: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #151529, #252545, #151529);
      background-size: 220% 100%;
      animation: pulse 1.15s infinite ease-in-out;
    }

    .skeleton-line.short {
      width: 42%;
    }

    .skeleton-line.medium {
      width: 70%;
    }

    .skeleton-line.long {
      width: 92%;
    }

    @keyframes pulse {
      0% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 800px) {
      .shell {
        width: min(100% - 24px, 1120px);
        padding-top: 18px;
      }

      .quick-grid,
      .selector-grid,
      .metrics-grid,
      .feedback-grid,
      .skeleton-grid {
        grid-template-columns: 1fr;
      }

      .header-panel {
        grid-template-columns: 1fr;
      }

      .icon-box {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel panel-accent header-panel">
      <div class="icon-box" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" role="img">
          <path d="M6 4v5M18 4v5M4 9h16M7 9v11M17 9v11M7 15h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <circle cx="7" cy="20" r="1.7" fill="currentColor"/>
          <circle cx="17" cy="20" r="1.7" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1 class="font-mono text-3xl sm:text-4xl font-extrabold tracking-normal">BotCheck</h1>
        <p class="mt-2 text-slate-400">Electrical validation for robotics builds</p>
      </div>
    </section>

    <section class="panel mt-5">
      <div class="section-label">Quick Tests</div>
      <div class="quick-grid" id="presetGrid"></div>
    </section>

    <section class="panel mt-5">
      <div class="section-label">Build Selector</div>
      <div class="selector-grid">
        <label>
          Brain
          <select id="brainSelect" aria-label="Brain component"></select>
        </label>
        <label>
          Actuator
          <select id="actuatorSelect" aria-label="Actuator component"></select>
        </label>
        <label>
          Power
          <select id="powerSelect" aria-label="Power component"></select>
        </label>
      </div>
      <div class="run-row">
        <button class="run-btn" id="runButton" type="button">
          <span class="button-spinner" aria-hidden="true"></span>
          <span class="button-label">Run BotCheck</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>

    <section class="panel mt-5">
      <div class="section-label">Metrics</div>
      <div class="metrics-grid">
        <article class="metric">
          <span class="metric-label">Weight</span>
          <span class="metric-value">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 21h12M7 21l2-12h6l2 12M9 9l3-6 3 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="weightMetric">--</span>
          </span>
        </article>
        <article class="metric">
          <span class="metric-label">Supply</span>
          <span class="metric-value">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M13 2 4 14h7l-1 8 10-13h-7l1-7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
            <span id="voltageMetric">--</span>
          </span>
        </article>
        <article class="metric">
          <span class="metric-label">Status</span>
          <span class="metric-value" id="statusMetric">
            <span class="badge">--</span>
          </span>
        </article>
      </div>
    </section>

    <section class="feedback-section panel mt-5" id="feedbackSection" hidden>
      <div class="section-label">AI Feedback Blocks</div>
      <div class="state-banner" id="errorBanner">
        <div>
          <strong>BotCheck failed to connect. Retry.</strong>
          <p id="errorDetail">Check the serverless function and environment variables.</p>
        </div>
        <button class="retry-btn" id="retryButton" type="button">Retry</button>
      </div>
      <div class="skeleton-grid" id="skeletonGrid" hidden>
        <article class="skeleton-card">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line long"></div>
        </article>
        <article class="skeleton-card">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line medium"></div>
        </article>
        <article class="skeleton-card">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line medium"></div>
        </article>
        <article class="skeleton-card">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line short"></div>
        </article>
      </div>
      <div class="feedback-grid" id="feedbackGrid" hidden>
        <article class="feedback-card" id="powerCard">
          <header>
            <span>Power</span>
            <span id="powerStatusBadge"></span>
          </header>
          <h3 id="powerHeadline"></h3>
          <div id="powerReason"></div>
        </article>

        <article class="feedback-card" id="fixCard">
          <header>
            <span>Recommended Fix</span>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m14.7 6.3 3-3a4.8 4.8 0 0 1-6.2 6.2l-7.2 7.2a2.1 2.1 0 1 0 3 3l7.2-7.2a4.8 4.8 0 0 1 6.2-6.2l-3 3-3-3Z" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </header>
          <div id="fixBody"></div>
        </article>

        <article class="feedback-card" id="compatCard">
          <header>
            <span>Compatibility</span>
          </header>
          <div id="compatBody"></div>
        </article>

        <article class="feedback-card" id="weightCard">
          <header>
            <span>Weight</span>
            <span id="weightBadge"></span>
          </header>
          <p id="weightNote"></p>
        </article>
      </div>
    </section>
  </main>

  <script>
    const DB = {
      brains: {
        "Arduino Uno": { logic_v: 5.0, min_vin: 7.0, max_vin: 12.0, weight_kg: 0.025 },
        "ESP32":       { logic_v: 3.3, min_vin: 4.5, max_vin: 5.5,  weight_kg: 0.010 },
      },
      actuators: {
        "SG90 Micro Servo": { op_v: 5.0, max_v: 6.0, current_a: 0.500, weight_kg: 0.009 },
        "N20 Gear Motor":   { op_v: 6.0, max_v: 6.0, current_a: 1.200, weight_kg: 0.015 },
      },
      power: {
        "3S LiPo (11.1V)": { voltage: 11.1, weight_kg: 0.130 },
        "1S LiPo (3.7V)":  { voltage: 3.7,  weight_kg: 0.030 },
        "5V Power Bank":    { voltage: 5.0,  weight_kg: 0.150 },
      }
    };

    const presets = [
      { label: "Line Follower", status: "PASS", brain: "Arduino Uno", actuator: "SG90 Micro Servo", power: "5V Power Bank" },
      { label: "Drone Loadout", status: "FAIL", brain: "ESP32", actuator: "N20 Gear Motor", power: "3S LiPo (11.1V)" },
      { label: "Micro Bot", status: "FAIL", brain: "Arduino Uno", actuator: "N20 Gear Motor", power: "1S LiPo (3.7V)" }
    ];

    const elements = {
      brain: document.getElementById("brainSelect"),
      actuator: document.getElementById("actuatorSelect"),
      power: document.getElementById("powerSelect"),
      runButton: document.getElementById("runButton"),
      retryButton: document.getElementById("retryButton"),
      presetGrid: document.getElementById("presetGrid"),
      feedbackSection: document.getElementById("feedbackSection"),
      feedbackGrid: document.getElementById("feedbackGrid"),
      skeletonGrid: document.getElementById("skeletonGrid"),
      errorBanner: document.getElementById("errorBanner"),
      errorDetail: document.getElementById("errorDetail"),
      weightMetric: document.getElementById("weightMetric"),
      voltageMetric: document.getElementById("voltageMetric"),
      statusMetric: document.getElementById("statusMetric"),
      powerCard: document.getElementById("powerCard"),
      powerStatusBadge: document.getElementById("powerStatusBadge"),
      powerHeadline: document.getElementById("powerHeadline"),
      powerReason: document.getElementById("powerReason"),
      fixCard: document.getElementById("fixCard"),
      fixBody: document.getElementById("fixBody"),
      compatBody: document.getElementById("compatBody"),
      weightBadge: document.getElementById("weightBadge"),
      weightNote: document.getElementById("weightNote"),
    };

    let lastSelection = null;
    let lastChecks = null;

    function runChecks(brain, actuator, power) {
      const errors = [];
      const weight = +(brain.weight_kg + actuator.weight_kg + power.weight_kg).toFixed(3);

      if (power.voltage > actuator.max_v)
        errors.push({ code: "CRITICAL_OVERVOLTAGE",
          detail: `${power.voltage}V supply exceeds actuator max of ${actuator.max_v}V` });

      if (power.voltage < brain.min_vin)
        errors.push({ code: "UNDERVOLTAGE_BROWNOUT",
          detail: `${power.voltage}V supply is below brain minimum of ${brain.min_vin}V` });

      return { weight, errors, status: errors.length === 0 ? "PASS" : "FAIL" };
    }

    function optionList(select, group, placeholder) {
      select.textContent = "";
      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = placeholder;
      select.append(empty);

      Object.keys(DB[group]).forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.append(option);
      });
    }

    function renderPresets() {
      presets.forEach((preset) => {
        const button = document.createElement("button");
        button.className = "preset-btn";
        button.type = "button";
        button.dataset.preset = preset.label;

        const label = document.createElement("span");
        label.textContent = preset.label;
        label.className = "font-semibold";

        const state = document.createElement("span");
        state.className = `badge badge-${preset.status.toLowerCase()}`;
        state.textContent = preset.status;

        const left = document.createElement("span");
        left.className = "inline-flex items-center gap-3";

        const dot = document.createElement("span");
        dot.className = "dot";
        dot.style.color = preset.status === "PASS" ? "var(--safe)" : "var(--critical)";
        dot.style.background = preset.status === "PASS" ? "var(--safe)" : "var(--critical)";

        left.append(dot, label);
        button.append(left, state);
        button.addEventListener("click", () => {
          elements.brain.value = preset.brain;
          elements.actuator.value = preset.actuator;
          elements.power.value = preset.power;
          updateMetrics();
          validateBuild();
        });

        elements.presetGrid.append(button);
      });
    }

    function getSelection() {
      if (!elements.brain.value || !elements.actuator.value || !elements.power.value) {
        return null;
      }

      return {
        brainName: elements.brain.value,
        actuatorName: elements.actuator.value,
        powerName: elements.power.value,
        brain: DB.brains[elements.brain.value],
        actuator: DB.actuators[elements.actuator.value],
        power: DB.power[elements.power.value],
      };
    }

    function updateMetrics() {
      const selection = getSelection();
      if (!selection) {
        lastSelection = null;
        lastChecks = null;
        elements.weightMetric.textContent = "--";
        elements.voltageMetric.textContent = "--";
        renderStatusMetric("--");
        elements.feedbackSection.hidden = true;
        return null;
      }

      const checks = runChecks(selection.brain, selection.actuator, selection.power);
      lastSelection = selection;
      lastChecks = checks;
      elements.weightMetric.textContent = `${checks.weight.toFixed(3)} kg`;
      elements.voltageMetric.textContent = `${selection.power.voltage.toFixed(1)}V`;
      renderStatusMetric(checks.status);
      return checks;
    }

    function renderStatusMetric(status) {
      elements.statusMetric.textContent = "";
      const badge = makeBadge(status, status);
      elements.statusMetric.append(badge);
    }

    function makeBadge(text, type) {
      const badge = document.createElement("span");
      badge.className = `badge badge-${String(type).toLowerCase()}`;
      badge.textContent = text;
      return badge;
    }

    async function validateBuild() {
      const checks = updateMetrics();
      if (!lastSelection || !checks) {
        return;
      }

      setState("loading");

      try {
        const response = await fetch("/api/validate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            brainName: lastSelection.brainName,
            actuatorName: lastSelection.actuatorName,
            powerName: lastSelection.powerName
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(readApiError(data));
        renderBlocks(data);
        setState("ready");
      } catch (error) {
        console.error(error);
        setState("error", error.message);
      }
    }

    function setState(state, detail = "") {
      const loading = state === "loading";
      elements.feedbackSection.hidden = false;
      elements.skeletonGrid.hidden = !loading;
      elements.feedbackGrid.hidden = state !== "ready";
      elements.errorBanner.style.display = state === "error" ? "flex" : "none";
      elements.errorDetail.textContent = detail || "Check the serverless function and environment variables.";
      elements.runButton.disabled = loading;
      elements.runButton.classList.toggle("loading", loading);
      elements.feedbackSection.setAttribute("aria-busy", String(loading));
      elements.runButton.querySelector(".button-label").textContent = loading ? "Checking..." : "Run BotCheck";
    }

    function readApiError(data) {
      if (typeof data?.error === "string") return data.error;
      if (data?.error?.message) return data.error.message;
      return "API request failed";
    }

    function renderBlocks(result) {
      renderPower(result.power || {});
      renderFix(result.fix || {});
      renderCompatibility(result.compatibility || {});
      renderWeight(result.weight || {});
    }

    function renderPower(power) {
      const status = safeEnum(power.status, ["SAFE", "WARNING", "CRITICAL"], "WARNING");
      elements.powerCard.className = `feedback-card ${status === "CRITICAL" ? "critical" : ""}`;
      elements.powerStatusBadge.textContent = "";
      elements.powerStatusBadge.append(makeBadge(status, status));
      elements.powerHeadline.textContent = limitWords(power.headline || "Power check needs review", 10);

      elements.powerReason.textContent = "";
      splitTwoSentences(power.reason || "The power state could not be fully analyzed. Review the deterministic metrics before powering the build.").forEach((sentence) => {
        const p = document.createElement("p");
        p.textContent = sentence;
        elements.powerReason.append(p);
      });
    }

    function renderFix(fix) {
      elements.fixBody.textContent = "";
      elements.fixCard.className = "feedback-card";

      if (fix.needed === false) {
        elements.fixCard.classList.add("safe");
        const p = document.createElement("p");
        p.textContent = "No fix required. Build is electrically safe.";
        elements.fixBody.append(p);
        return;
      }

      const chip = document.createElement("code");
      chip.className = "part-chip";
      chip.textContent = fix.part || "Review required";

      const spec = document.createElement("p");
      spec.className = "spec-line";
      spec.textContent = fix.spec ? `Spec: ${fix.spec}` : "Spec: Review voltage and current requirements.";

      const why = document.createElement("p");
      why.textContent = fix.why || "This component should bring the loadout back inside safe electrical limits.";

      elements.fixBody.append(chip, spec, why);
    }

    function renderCompatibility(compatibility) {
      elements.compatBody.textContent = "";

      elements.compatBody.append(
        makeLogicRow(compatibility.logic_match || "MISMATCH", compatibility.logic_note || "Logic compatibility was not confirmed."),
        makeCurrentRow(compatibility.current_ok === true, compatibility.current_note || "Current capacity was not confirmed.")
      );
    }

    function makeLogicRow(status, note) {
      const wrapper = document.createElement("div");

      const row = document.createElement("div");
      row.className = "compat-row";

      const title = document.createElement("strong");
      title.textContent = "Logic";

      const badge = makeBadge(status, status);

      const spacer = document.createElement("span");
      spacer.setAttribute("aria-hidden", "true");

      const p = document.createElement("p");
      p.textContent = note;

      row.append(title, badge, spacer);
      wrapper.append(row, p);
      return wrapper;
    }

    function makeCurrentRow(ok, note) {
      const wrapper = document.createElement("div");

      const row = document.createElement("div");
      row.className = "compat-row";

      const title = document.createElement("strong");
      title.textContent = "Current";

      const badge = document.createElement("span");
      badge.className = `badge badge-${ok ? "true" : "false"}`;
      badge.setAttribute("aria-label", ok ? "Current OK" : "Current failed");
      badge.append(makeCurrentIcon(ok));

      const spacer = document.createElement("span");
      spacer.setAttribute("aria-hidden", "true");

      const p = document.createElement("p");
      p.textContent = note;

      row.append(title, badge, spacer);
      wrapper.append(row, p);
      return wrapper;
    }

    function makeCurrentIcon(ok) {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("fill", "none");
      svg.setAttribute("aria-hidden", "true");

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", ok ? "m5 12 4 4L19 6" : "M7 7l10 10M17 7 7 17");
      path.setAttribute("stroke", "currentColor");
      path.setAttribute("stroke-width", "2.4");
      path.setAttribute("stroke-linecap", "round");
      if (ok) path.setAttribute("stroke-linejoin", "round");
      svg.append(path);
      return svg;
    }

    function renderWeight(weight) {
      const rating = safeEnum(weight.rating, ["ULTRALIGHT", "LIGHT", "BALANCED", "HEAVY"], "BALANCED");
      elements.weightBadge.textContent = "";
      elements.weightBadge.append(makeBadge(rating, rating));
      elements.weightNote.textContent = weight.note || "Weight impact could not be evaluated.";
    }

    function splitTwoSentences(value) {
      const sentences = String(value).trim().match(/.+?(?:[.!?](?=\s+[A-Z]|$)|$)/g) || [String(value)];
      const cleaned = sentences.map((sentence) => sentence.trim()).filter(Boolean);
      if (cleaned.length >= 2) return cleaned.slice(0, 2);
      return [cleaned[0] || "Power status is unavailable.", "Review the deterministic metrics before powering the build."];
    }

    function limitWords(value, maxWords) {
      const words = String(value).trim().split(/\s+/).filter(Boolean);
      return words.slice(0, maxWords).join(" ");
    }

    function safeEnum(value, allowed, fallback) {
      return allowed.includes(value) ? value : fallback;
    }

    function init() {
      optionList(elements.brain, "brains", "Select brain");
      optionList(elements.actuator, "actuators", "Select actuator");
      optionList(elements.power, "power", "Select power");
      renderPresets();
      updateMetrics();

      [elements.brain, elements.actuator, elements.power].forEach((select) => {
        select.addEventListener("change", () => {
          updateMetrics();
          elements.feedbackSection.hidden = true;
        });
      });

      elements.runButton.addEventListener("click", validateBuild);
      elements.retryButton.addEventListener("click", validateBuild);
    }

    init();
  </script>
</body>
</html>
